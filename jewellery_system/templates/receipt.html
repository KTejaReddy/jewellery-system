<!DOCTYPE html>

<html>

<head>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-5">

<div class="receipt">

<h2 class="text-center">Jewellery Submission Receipt</h2>

<hr>

<p><b>Tracking ID:</b> {{tracking}}</p>

<p><b>Jewellery:</b> {{title}}</p>

<p><b>Date:</b> {{date}}</p>

<p><b>Status:</b> Submitted</p>

<hr>

<button onclick="window.print()" class="btn btn-dark">
Print Receipt
</button>

</div>

</div>

</body>
</html>
