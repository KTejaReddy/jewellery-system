{% extends "layout.html" %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

<h2>{{ t.dashboard }}</h2>

<div>

<a href="/language/en" class="btn btn-sm btn-light">English</a>

<a href="/language/hi" class="btn btn-sm btn-light">हिन्दी</a>

<a href="/language/te" class="btn btn-sm btn-light">తెలుగు</a>

</div>

</div>

<div class="card p-4">

<h4 class="mb-3">{{ t.requests }}</h4>

<table class="table table-striped">

<thead>

<tr>
<th>{{ t.tracking }}</th>
<th>{{ t.jewellery }}</th>
<th>{{ t.status }}</th>
</tr>

</thead>

<tbody>

{% for i in data %}

<tr>

<td>{{ i.tracking }}</td>

<td>{{ i.title }}</td>

<td>

<div class="timeline">

<div class="step {% if i.status=='Submitted' or i.status=='Assigned' or i.status=='Processing' or i.status=='Completed' %}active{% endif %}">
Submitted
</div>

<div class="step {% if i.status=='Assigned' or i.status=='Processing' or i.status=='Completed' %}active{% endif %}">
Assigned
</div>

<div class="step {% if i.status=='Processing' or i.status=='Completed' %}active{% endif %}">
Processing
</div>

<div class="step {% if i.status=='Completed' %}active{% endif %}">
Completed
</div>

</div>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
