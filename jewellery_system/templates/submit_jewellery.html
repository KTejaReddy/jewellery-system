<!DOCTYPE html>
<html>

<head>

<title>Submit Jewellery</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow p-4 fade-in">

<h3 class="text-center mb-4">
<i class="fa-solid fa-gem text-warning"></i>
Submit Jewellery
</h3>

<form method="POST" enctype="multipart/form-data">

<div class="mb-3">

<label class="form-label">
<i class="fa-solid fa-tag"></i>
Jewellery Title
</label>

<input name="title" class="form-control" placeholder="Enter jewellery name" required>

</div>


<div class="mb-3">

<label class="form-label">
<i class="fa-solid fa-align-left"></i>
Description
</label>

<textarea name="description" class="form-control" rows="4"
placeholder="Describe the jewellery details"
required></textarea>

</div>


<div class="mb-3">

<label class="form-label">
<i class="fa-solid fa-image"></i>
Upload Jewellery Image
</label>

<input type="file" name="image" class="form-control" required>

</div>


<div class="mb-3">

<label class="form-label">
<i class="fa-solid fa-file"></i>
Supporting Document
</label>

<input type="file" name="file" class="form-control">

</div>


<div class="d-grid">

<button class="btn btn-success btn-lg">

<i class="fa-solid fa-paper-plane"></i>
Submit Request

</button>

</div>

</form>

<hr>

<a href="/customer" class="btn btn-secondary w-100">

<i class="fa-solid fa-arrow-left"></i>
Back to Dashboard

</a>

</div>

</div>

</div>

</div>

</body>
</html>
