<!DOCTYPE html>
<html>

<head>

<title>Submit Jewellery</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow p-4">

<h3 class="text-center mb-4">Submit Jewellery</h3>

<form method="POST" enctype="multipart/form-data">

<div class="mb-3">

<label class="form-label">Jewellery Title</label>

<input name="title" class="form-control" required>

</div>

<div class="mb-3">

<label class="form-label">Description</label>

<textarea name="description" class="form-control" rows="4" required></textarea>

</div>

<div class="mb-3">

<label class="form-label">Upload Jewellery Image</label>

<input type="file" name="image" class="form-control" required>

</div>

<div class="mb-3">

<label class="form-label">Supporting Document</label>

<input type="file" name="file" class="form-control">

</div>

<div class="d-grid">

<button class="btn btn-success">
Submit Request
</button>

</div>

</form>

<br>

<a href="/customer" class="btn btn-secondary w-100">
Back to Dashboard
</a>

</div>

</div>

</div>

</div>

</body>
</html>
