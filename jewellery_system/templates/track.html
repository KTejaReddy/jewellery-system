<!DOCTYPE html>
<html>

<head>

<title>Track Jewellery</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

.timeline {
display:flex;
justify-content:space-between;
margin-top:30px;
}

.step {
text-align:center;
flex:1;
}

.circle {
width:30px;
height:30px;
border-radius:50%;
background:#ccc;
margin:auto;
}

.active {
background:#28a745;
}

.line {
height:4px;
background:#ccc;
flex:1;
margin-top:13px;
}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">Track Jewellery</h2>

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow p-4">

<form method="POST">

<label class="mb-2">Enter Tracking ID</label>

<input
type="text"
name="tracking"
class="form-control mb-3"
placeholder="JWL-123456"
required>

<button class="btn btn-primary w-100">
Track
</button>

</form>

</div>

</div>

</div>

{% if item %}

<br>

<div class="card shadow p-4">

<div class="row">

<div class="col-md-4">

<img src="/images/{{item.image}}" class="img-fluid">

</div>

<div class="col-md-8">

<h4>{{item.title}}</h4>

<p><b>Tracking ID:</b> {{item.tracking}}</p>

<p><b>Description:</b> {{item.description}}</p>

<p><b>Date:</b> {{item.date}}</p>

</div>

</div>

<hr>

<h5>Status Timeline</h5>

<div class="timeline">

<div class="step">
<div class="circle {% if item.status in ['Submitted','Assigned','Processing','Completed','Resolved'] %}active{% endif %}"></div>
<p>Submitted</p>
</div>

<div class="step">
<div class="circle {% if item.status in ['Assigned','Processing','Completed','Resolved'] %}active{% endif %}"></div>
<p>Assigned</p>
</div>

<div class="step">
<div class="circle {% if item.status in ['Processing','Completed','Resolved'] %}active{% endif %}"></div>
<p>Processing</p>
</div>

<div class="step">
<div class="circle {% if item.status in ['Completed','Resolved'] %}active{% endif %}"></div>
<p>Completed</p>
</div>

<div class="step">
<div class="circle {% if item.status == 'Resolved' %}active{% endif %}"></div>
<p>Resolved</p>
</div>

</div>

</div>

{% endif %}

</div>

</body>
</html>
