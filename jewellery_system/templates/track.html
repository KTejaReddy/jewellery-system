<!DOCTYPE html>
<html>

<head>

<title>Track Jewellery</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="/static/style.css">

<style>

.timeline{
display:flex;
justify-content:space-between;
margin-top:40px;
position:relative;
}

.timeline::before{
content:"";
position:absolute;
top:14px;
left:0;
right:0;
height:4px;
background:#ddd;
z-index:0;
}

.step{
text-align:center;
flex:1;
position:relative;
z-index:1;
}

.circle{
width:30px;
height:30px;
border-radius:50%;
background:#bbb;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:12px;
}

.active{
background:#28a745;
}

.step p{
margin-top:8px;
font-size:13px;
}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">

<i class="fa-solid fa-magnifying-glass text-warning"></i>
Track Jewellery

</h2>


<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow p-4 fade-in">

<form method="POST">

<label class="mb-2">
<i class="fa-solid fa-barcode"></i>
Enter Tracking ID
</label>

<input
type="text"
name="tracking"
class="form-control mb-3"
placeholder="JWL-123456"
required>

<button class="btn btn-primary w-100">

<i class="fa-solid fa-search"></i>
Track Jewellery

</button>

</form>

</div>

</div>

</div>


{% if item %}

<br>

<div class="card shadow p-4 fade-in">

<div class="row">

<div class="col-md-4 text-center">

<img src="/images/{{item.image}}" class="img-fluid rounded">

</div>

<div class="col-md-8">

<h4 class="mb-3">

<i class="fa-solid fa-gem text-warning"></i>
{{item.title}}

</h4>

<p><b>Tracking ID:</b> {{item.tracking}}</p>

<p><b>Description:</b> {{item.description}}</p>

<p><b>Date:</b> {{item.date}}</p>

</div>

</div>

<hr>

<h5 class="text-center">

<i class="fa-solid fa-clock"></i>
Status Timeline

</h5>

<div class="timeline">

<div class="step">
<div class="circle {% if item.status in ['Submitted','Assigned','Processing','Completed','Resolved'] %}active{% endif %}">1</div>
<p>Submitted</p>
</div>

<div class="step">
<div class="circle {% if item.status in ['Assigned','Processing','Completed','Resolved'] %}active{% endif %}">2</div>
<p>Assigned</p>
</div>

<div class="step">
<div class="circle {% if item.status in ['Processing','Completed','Resolved'] %}active{% endif %}">3</div>
<p>Processing</p>
</div>

<div class="step">
<div class="circle {% if item.status in ['Completed','Resolved'] %}active{% endif %}">4</div>
<p>Completed</p>
</div>

<div class="step">
<div class="circle {% if item.status == 'Resolved' %}active{% endif %}">5</div>
<p>Resolved</p>
</div>

</div>

</div>

{% endif %}

</div>

</body>
</html>
